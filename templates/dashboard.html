<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BookVerse</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:
                radial-gradient(1100px 520px at -8% -8%, rgba(98,182,255,0.24), transparent 56%),
                radial-gradient(760px 520px at 105% 12%, rgba(114,235,205,0.16), transparent 55%),
                linear-gradient(140deg, #041025, #071a35 58%, #0f2543);
            color:white;
            position:relative;
            overflow-x:hidden;
        }

        body::before,
        body::after{
            content:"";
            position:fixed;
            pointer-events:none;
            z-index:-1;
        }

        body::before{
            width:420px;
            height:420px;
            border-radius:50%;
            left:-140px;
            top:220px;
            background:radial-gradient(circle at center, rgba(122,210,255,0.24), rgba(122,210,255,0));
        }

        body::after{
            inset:0;
            background-image:linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size:56px 56px;
            mask-image:linear-gradient(180deg, rgba(0,0,0,0.6), transparent 90%);
        }

        .navbar{
            background:rgba(5,15,31,0.76);
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:18px;
            flex-wrap:wrap;
            border-bottom:1px solid rgba(136,196,255,0.22);
            backdrop-filter:blur(10px);
        }

        .logo{
            font-size:40px;
            font-weight:bold;
            color:#4da3ff;
        }

        .nav-actions{
            display:flex;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }

        .logout-btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            background:#28a745;
            color:white;
            padding:12px 22px;
            text-decoration:none;
            border-radius:12px;
            font-size:17px;
            font-weight:600;
            min-width:160px;
            transition:background 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease;
            box-shadow:0 10px 20px rgba(3, 18, 9, 0.25);
        }

        .logout-btn:hover{
            background:#218838;
            box-shadow:0 14px 24px rgba(3, 18, 9, 0.35);
            transform:translateY(-1px);
        }

        .logout-btn:active{
            transform:translateY(1px) scale(0.98);
            box-shadow:0 8px 16px rgba(3, 18, 9, 0.24);
        }

        .main{
            text-align:center;
            padding:60px 20px;
        }

        .box{
            background:linear-gradient(160deg, rgba(19,39,65,0.82), rgba(12,28,48,0.84));
            width:500px;
            margin:auto;
            padding:50px;
            border-radius:20px;
            border:1px solid rgba(150,200,255,0.22);
            box-shadow:0 22px 50px rgba(4,12,26,0.45);
        }

        .box h1{
            font-size:50px;
            margin-bottom:20px;
        }

        .box p{
            font-size:20px;
            margin-bottom:20px;
        }

        .email{
            color:#4da3ff;
            font-size:25px;
        }

        .books{
            margin-top:60px;
            text-align:center;
        }

        .books h1{
            margin-bottom:40px;
            font-size:50px;
        }

        .book-container{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
            padding-bottom:50px;
        }

        .card{
            background:linear-gradient(160deg, rgba(24,47,76,0.82), rgba(16,35,59,0.86));
            width:280px;
            border-radius:15px;
            overflow:hidden;
            padding-bottom:25px;
            border:1px solid rgba(147,194,255,0.24);
            box-shadow:0 20px 42px rgba(5,14,28,0.45);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card h2{
            margin-top:20px;
        }

        .card p{
            margin:15px 0;
            color:#ddd;
        }

        .buy-btn{
            background:#28a745;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .buy-btn:hover{
            background:#218838;
        }

        @media (max-width: 820px){
            .navbar{
                padding:16px 18px;
            }

            .logo{
                font-size:30px;
            }

            .nav-actions{
                width:100%;
                justify-content:flex-start;
            }

            .logout-btn{
                min-width:0;
                flex:1 1 180px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">

    <div class="logo">
        📚 BookVerse
    </div>

    <div class="nav-actions">

        <a href="/my-purchases" class="logout-btn">
            My Purchases
        </a>

        <a href="/change-password" class="logout-btn">
            Change Password
        </a>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </div>

</div>

    <div class="main">

        <div class="box">
            <h1>Welcome to Dashboard 🚀</h1>

            <p>You are successfully logged in.</p>

            <div class="email">
                Logged in as:
                <br><br>
                <b>{{ email }}</b>
            </div>
        </div>

        <div class="books">

            <h1>Recommended Books</h1>

            <div class="book-container">

                <!-- Ethical Hacking -->
                <div class="card">

                    <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=500">

                    <h2>Ethical Hacking</h2>

                    <p>Cyber Security Guide</p>

                    <a href="/purchase/ethical-hacking">
                        <button class="buy-btn">
                            Buy Now
                        </button>
                    </a>

                </div>

                <!-- Python -->
                <div class="card">

                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500">

                    <h2>Python Programming</h2>

                    <p>Beginner to Advanced</p>

                    <a href="/purchase/python-programming">
                        <button class="buy-btn">
                            Buy Now
                        </button>
                    </a>

                </div>

                <!-- Networking -->
                <div class="card">

                    <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=500">

                    <h2>Networking</h2>

                    <p>Complete Networking Guide</p>

                    <a href="/purchase/networking">
                        <button class="buy-btn">
                            Buy Now
                        </button>
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
