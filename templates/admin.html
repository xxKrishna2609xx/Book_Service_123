<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body{
            background:#02152b;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#4da3ff;
        }

        .stats{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:30px;
            flex-wrap:wrap;
        }

        .card{
            background:#0b1f3a;
            padding:25px;
            border-radius:15px;
            width:250px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        .card h2{
            color:#4da3ff;
        }

        table{
            width:100%;
            margin-top:40px;
            border-collapse:collapse;
            background:#0b1f3a;
        }

        th, td{
            padding:15px;
            border:1px solid #333;
            text-align:center;
        }

        th{
            background:#28a745;
        }

        a{
            color:white;
            text-decoration:none;
            background:#28a745;
            padding:12px 20px;
            border-radius:10px;
        }

        .back{
            text-align:center;
            margin-top:30px;
        }
    </style>
</head>

<body>

    <h1>👑 Admin Dashboard</h1>

    <div class="stats">

        <div class="card">
            <h2>Total Users</h2>
            <h1>{{ total_users }}</h1>
        </div>

        <div class="card">
            <h2>Total Purchases</h2>
            <h1>{{ total_purchases }}</h1>
        </div>

        <div class="card">
            <h2>Total Revenue</h2>
            <h1>₹{{ revenue }}</h1>
        </div>

    </div>

    <h1 style="margin-top:50px;">
        Recent Purchases
    </h1>

    <table>

        <tr>
            <th>Email</th>
            <th>Book</th>
            <th>Payment</th>
        </tr>

        {% for purchase in purchases %}

        <tr>
            <td>{{ purchase[0] }}</td>
            <td>{{ purchase[1] }}</td>
            <td>{{ purchase[2] }}</td>
        </tr>

        {% endfor %}

    </table>

    <div class="back">
        <a href="/">Back to Home</a>
    </div>

</body>
</html>
