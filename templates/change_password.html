<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - BookVerse</title>
    <style>
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:
                radial-gradient(900px 500px at -8% -10%, rgba(95,179,255,0.22), transparent 56%),
                radial-gradient(700px 480px at 108% 10%, rgba(115,233,204,0.16), transparent 54%),
                linear-gradient(135deg, #041025, #071a35 58%, #0e2441);
            color:white;
            font-family:Arial, sans-serif;
            position:relative;
            overflow:hidden;
        }

        body::before,
        body::after{
            content:"";
            position:fixed;
            pointer-events:none;
            z-index:-1;
        }

        body::before{
            width:370px;
            height:370px;
            border-radius:50%;
            left:-120px;
            top:180px;
            background:radial-gradient(circle at center, rgba(121,209,255,0.2), rgba(121,209,255,0));
        }

        body::after{
            inset:0;
            background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size:56px 56px;
        }

        .box{
            width:360px;
            background:linear-gradient(160deg, rgba(19,39,65,0.84), rgba(11,26,46,0.88));
            padding:36px;
            border-radius:18px;
            box-shadow:0 22px 48px rgba(5,14,28,0.45);
            border:1px solid rgba(148,195,255,0.24);
        }

        h1{
            margin-top:0;
            color:#4da3ff;
            text-align:center;
        }

        input{
            width:100%;
            box-sizing:border-box;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:#28a745;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        a{
            display:block;
            margin-top:16px;
            text-align:center;
            color:#4da3ff;
            text-decoration:none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Change Password</h1>
        <form method="POST">
            <input type="password" name="current_password" placeholder="Current Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit">Update Password</button>
        </form>
        <a href="/dashboard">← Back to Dashboard</a>
    </div>
</body>
</html>
