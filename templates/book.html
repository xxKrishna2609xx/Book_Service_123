<!DOCTYPE html>
<html>
<head>
    <title>{{ book.title }}</title>

    <style>
        body{
            background:
                radial-gradient(900px 500px at -8% -10%, rgba(95,179,255,0.22), transparent 56%),
                radial-gradient(700px 480px at 108% 10%, rgba(115,233,204,0.16), transparent 54%),
                linear-gradient(135deg, #041025, #071a35 58%, #0e2441);
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            position:relative;
            overflow:hidden;
        }

        body::before,
        body::after{
            content:"";
            position:fixed;
            pointer-events:none;
            z-index:-1;
        }

        body::before{
            width:380px;
            height:380px;
            border-radius:50%;
            right:-120px;
            top:180px;
            background:radial-gradient(circle at center, rgba(121,209,255,0.2), rgba(121,209,255,0));
        }

        body::after{
            inset:0;
            background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size:56px 56px;
        }

        .book-box{
            background:linear-gradient(160deg, rgba(19,39,65,0.84), rgba(11,26,46,0.88));
            padding:40px;
            border-radius:20px;
            width:400px;
            text-align:center;
            border:1px solid rgba(148,195,255,0.24);
            box-shadow:0 22px 48px rgba(5,14,28,0.45);
        }

        h1{
            color:#4da3ff;
        }

        .price{
            color:#28a745;
            font-size:30px;
            font-weight:bold;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:10px;
            cursor:pointer;
        }

        a{
            color:#4da3ff;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="book-box">

    <h1>{{ book.title }}</h1>

    <p>{{ book.description }}</p>

    <h2 class="price">
        {{ book.price }}
    </h2>

    <a href="/purchase/{{ book_slug }}">
        <button>
            Purchase Now
        </button>
    </a>

    <br><br>

    <a href="/dashboard">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
